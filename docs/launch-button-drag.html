<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>特斯拉式换挡启动v2</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI Variable', 'Segoe UI', -apple-system, sans-serif;
            background: linear-gradient(180deg, #1b2838 0%, #12171e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
            user-select: none;
        }

        h1 { color: #c7d5e0; font-weight: 300; letter-spacing: 2px; margin-bottom: 5px; }
        .subtitle { color: #8b98a0; font-size: 13px; margin-bottom: 30px; }

        .container {
            position: relative;
            width: 280px;
            height: 380px;
        }

        /* ===== SHIFT PATTERN ===== */
        .shift-pattern {
            position: relative;
            width: 140px;
            height: 320px;
            margin: 0 auto;
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(102, 192, 249, 0.2);
            border-radius: 30px;
            overflow: hidden;
        }

        .track-line {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 3px;
            height: 100%;
            background: rgba(102, 192, 249, 0.1);
        }

        /* Drive positions */
        .drive-pos {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            border-radius: 20px;
        }

        .drive-pos.top {
            top: 10px;
            background: linear-gradient(180deg, rgba(102, 192, 249, 0.15), transparent);
            color: #66c0f9;
        }

        .drive-pos.middle {
            top: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 45px;
            border-radius: 22px;
            background: linear-gradient(180deg, rgba(102, 192, 249, 0.2), rgba(102, 192, 249, 0.1));
            color: #66c0f9;
        }

        .drive-pos.bottom {
            bottom: 15px;
            background: linear-gradient(0deg, rgba(102, 192, 249, 0.15), transparent);
            color: #66c0f9;
        }

        .drive-pos.park {
            top: -30px;
            font-size: 18px;
            letter-spacing: 1px;
        }

        .drive-pos.active {
            background: linear-gradient(180deg, rgba(102, 192, 249, 0.4), rgba(102, 192, 249, 0.2));
            box-shadow: 0 0 20px rgba(102, 192, 249, 0.5);
        }

        .drive-pos.active.top { color: #fff; }
        .drive-pos.active.middle { background: linear-gradient(180deg, rgba(16, 185, 129, 0.4), rgba(16, 185, 129, 0.2)); color: #fff; }
        .drive-pos.active.bottom { color: #fff; }
        .drive-pos.active.park { background: linear-gradient(180deg, rgba(244, 114, 182, 0.4), rgba(244, 114, 182, 0.2)); color: #fff; }

        .sub-label { font-size: 8px; opacity: 0.7; margin-top: 2px; }

        /* ===== GEAR KNOB ===== */
        .gear-knob {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 55px;
            height: 55px;
            background: linear-gradient(145deg, #2a475e, #1b2838);
            border: 2px solid #66c0f9;
            border-radius: 50%;
            cursor: grab;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            box-shadow: 0 5px 25px rgba(102, 192, 249, 0.3);
        }

        .gear-knob:active { cursor: grabbing; }

        .gear-knob::after {
            content: '';
            position: absolute;
            width: 5px;
            height: 5px;
            background: #66c0f9;
            border-radius: 50%;
            top: 10px;
        }

        .knob-label {
            font-size: 16px;
            font-weight: bold;
            color: #66c0f9;
        }

        /* Swipe hint arrows */
        .swipe-hint {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
            color: rgba(102, 192, 249, 0.3);
            animation: pulseHint 1.5s ease-in-out infinite;
        }

        .swipe-hint.top { top: 0; }
        .swipe-hint.bottom { bottom: 0; }

        @keyframes pulseHint {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 0.5; }
        }

        /* Side P button */
        .p-button {
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 40px;
            height: 40px;
            background: rgba(42, 71, 94, 0.5);
            border: 1px solid rgba(102, 192, 249, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            color: #f472b6;
            cursor: pointer;
            transition: all 0.3s;
        }

        .p-button:active, .p-button.active {
            background: rgba(244, 114, 182, 0.3);
            border-color: #f472b6;
            box-shadow: 0 0 15px rgba(244, 114, 182, 0.5);
        }

        /* Gear indicator */
        .gear-indicator {
            position: absolute;
            bottom: -40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 22px;
            font-weight: bold;
            color: #66c0f9;
            transition: all 0.3s ease;
        }

        .status {
            color: #66c0f9;
            font-size: 14px;
            margin-top: 60px;
            min-height: 24px;
        }

        .instructions {
            color: #555;
            font-size: 11px;
            max-width: 300px;
            text-align: center;
            margin-top: 25px;
            line-height: 1.6;
        }

        .hint-row {
            display: flex;
            gap: 20px;
            margin-top: 15px;
            justify-content: center;
        }

        .hint-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 10px;
            color: #666;
        }

        .hint-key {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: bold;
        }

        .hint-key.D { background: linear-gradient(135deg, #66c0f9, #2a475e); }
        .hint-key.N { background: linear-gradient(135deg, #10b981, #047857); }
        .hint-key.R { background: linear-gradient(135deg, #f472b6, #be185d); }
        .hint-key.P { background: linear-gradient(135deg, #f472b6, #be185d); color: #fff !important; }
    </style>
</head>
<body>
    <h1>⚔️ 换挡启动</h1>
    <p class="subtitle">特斯拉式滑动手势</p>

    <div class="container">
        <div class="shift-pattern">
            <div class="track-line"></div>

            <!-- P Park/Multiplayer -->
            <div class="drive-pos top park" id="pos-p">
                <span>P</span>
                <span class="sub-label">联机</span>
            </div>

            <!-- D Drive -->
            <div class="drive-pos" id="pos-d" style="top: 45px;">
                <span>D</span>
                <span class="sub-label">前进</span>
            </div>

            <!-- N Neutral -->
            <div class="drive-pos middle active" id="pos-n">
                <span>N</span>
            </div>

            <!-- R Reverse -->
            <div class="drive-pos bottom" id="pos-r">
                <span>R</span>
                <span class="sub-label">倒车</span>
            </div>

            <!-- Gear Knob -->
            <div class="gear-knob" id="knob">
                <div class="knob-label" id="knob-label">N</div>
            </div>

            <div class="swipe-hint top">▲</div>
            <div class="swipe-hint bottom">▼</div>
        </div>

        <div class="gear-indicator" id="indicator">空档 (N)</div>
    </div>

    <div class="status" id="status">拖动滑块切换档位</div>

    <div class="hint-row">
        <div class="hint-item"><div class="hint-key P">P</div>联机</div>
        <div class="hint-item"><div class="hint-key D">D</div>前进</div>
        <div class="hint-item"><div class="hint-key N">N</div>空档</div>
        <div class="hint-item"><div class="hint-key R">R</div>倒车</div>
    </div>

    <p class="instructions">
        向上拖动到 P = 联机模式  |  向上拖动到 D = 前进模组版  |  下滑到 R = 倒车原版<br>
        中间松开 = 空档
    </p>

    <script>
        const knob = document.getElementById('knob');
        const knobLabel = document.getElementById('knob-label');
        const indicator = document.getElementById('indicator');
        const status = document.getElementById('status');
        const posP = document.getElementById('pos-p');
        const posD = document.getElementById('pos-d');
        const posN = document.getElementById('pos-n');
        const posR = document.getElementById('pos-r');

        let isDragging = false;
        let startY = 0;
        let currentY = 0;
        let currentGear = 'N';

        knob.addEventListener('mousedown', startDrag);
        document.addEventListener('mousemove', drag);
        document.addEventListener('mouseup', endDrag);

        knob.addEventListener('touchstart', (e) => startDrag(e.touches[0]));
        document.addEventListener('touchmove', (e) => { e.preventDefault(); drag(e.touches[0]); });
        document.addEventListener('touchend', endDrag);

        function startDrag(e) {
            isDragging = true;
            startY = e.clientY;
            knob.style.cursor = 'grabbing';
            status.textContent = '拖动中...';
            status.style.color = '#66c0f9';
        }

        function drag(e) {
            if (!isDragging) return;

            const deltaY = e.clientY - startY; // 向下为正

            currentY = deltaY;
            // Extend range to allow reaching P (above D)
            currentY = Math.max(-160, Math.min(100, currentY));

            knob.style.transform = `translate(-50%, calc(-50% + ${currentY}px))`;

            // 修正逻辑：向上滑（手指向上）= D/P，向下滑（手指向下）= R
            if (currentY < -100) {
                setGear('P');  // Top - Multiplayer
            } else if (currentY < -40) {
                setGear('D');  // Above middle - Modded
            } else if (currentY > 40) {
                setGear('R');  // Below middle - Vanilla
            } else {
                setGear('N');  // Middle - Neutral
            }
        }

        function endDrag() {
            if (!isDragging) return;
            isDragging = false;
            knob.style.cursor = 'grab';

            if (currentGear !== 'N') {
                launch(currentGear);
            } else {
                currentY = 0;
                knob.style.transition = 'transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
                knob.style.transform = 'translate(-50%, -50%)';
            }

            posP.classList.remove('active');
            posD.classList.remove('active');
            posN.classList.remove('active');
            posR.classList.remove('active');
        }

        function setGear(gear) {
            if (currentGear === gear) return;
            currentGear = gear;
            knobLabel.textContent = gear;

            indicator.textContent = gear === 'P' ? '联机模式' :
                                 gear === 'D' ? '前进档 (模组版)' :
                                 gear === 'R' ? '倒车档 (原版)' : '空档 (N)';

            const colors = { 'D': '#66c0f9', 'R': '#f472b6', 'P': '#f472b6', 'N': '#10b981' };
            indicator.style.color = colors[gear];
            status.textContent = gear === 'P' ? '联机模式 - 释放启动' :
                                gear === 'D' ? '前进档 - 释放启动模组版' :
                                gear === 'R' ? '倒车档 - 释放启动原版' : '空档';
            status.style.color = colors[gear];

            posP.classList.toggle('active', gear === 'P');
            posD.classList.toggle('active', gear === 'D');
            posN.classList.toggle('active', gear === 'N');
            posR.classList.toggle('active', gear === 'R');
        }

        function launch(gear) {
            const gearName = gear === 'P' ? '联机模式' :
                           gear === 'D' ? '前进档 (模组版)' :
                           gear === 'R' ? '倒车档 (原版)' : '空档';

            currentY = gear === 'P' ? -180 : (gear === 'D' ? -150 : 150);
            knob.style.transition = 'all 0.4s ease';
            knob.style.transform = `translate(-50%, calc(-50% + ${currentY}px))`;
            knob.style.opacity = '0';

            status.textContent = `正在启动 ${gearName}...`;

            setTimeout(() => {
                status.textContent = `✅ ${gearName} 游戏已启动！`;
                status.style.color = '#4ade80';
                setTimeout(resetKnob, 2000);
            }, 800);
        }

        function resetKnob() {
            currentY = 0;
            currentGear = 'N';
            knob.style.transition = 'all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
            knob.style.transform = 'translate(-50%, -50%)';
            knob.style.opacity = '1';
            setGear('N');
            setTimeout(() => {
                status.textContent = '拖动滑块切换档位';
            }, 500);
        }
    </script>
</body>
</html>
